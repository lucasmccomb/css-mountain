name = "css-mountain-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "css-mountain-db"
database_id = "placeholder-d1-id"
migrations_dir = "src/db/migrations"

# KV Namespace (session cache, rate limiting)
[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-id"

# R2 Bucket (user screenshots, challenge assets)
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "css-mountain-assets"

[vars]
ENVIRONMENT = "development"
APP_URL = "http://localhost:5173"

# OAuth secrets must be set via `wrangler secret put`:
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET
